<html>

<head>
    <title>mnmlclck</title>
    <meta name="viewport" content="width=device-width, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" href="Style.css" type="text/css" media="screen" />
    <script type="text/javascript" charset="utf-8" src="Config.js"></script>
    <script type="text/javascript" charset="utf-8" src="Scripts/jquery.min.js"></script>
    <script type="text/javascript" charset="utf-8" src="Scripts/main.js"></script>
    <script type="text/javascript" charset="utf-8" src="Scripts/date-en-US.js"></script>
</head>


<body onload="init()">

    <div id="Widget">
        <div id="Everything">
            <div class="Left">
                <a id="hour"></a>:<a id="minute"></a> <a id="ampm"></a>
            </div>

            <div class="Right">
                <a id="weekday"></a>
                <a id="month"></a>
                <a id="day"></a>
            </div>
        </div>
    </div>



</body>

<script>

    document.getElementById('Everything').style.color = FGColor;
    document.getElementById('Everything').style.textShadow = ShadowAmount + "px";
</script>

<script>
    (function () {
        'use strict';
        if (window.innerWidth === 320) {
            document.querySelector("meta[name=viewport]").setAttribute('content',
                'width=device-width, initial-scale=0.85, maximum-scale=0.85, user-scalable=0');
        } else if (window.innerWidth === 414) {
            document.querySelector("meta[name=viewport]").setAttribute('content',
                'width=device-width, initial-scale=1.104, maximum-scale=1.104, user-scalable=0');
        } else if (window.innerWidth === 425) {
            document.querySelector("meta[name=viewport]").setAttribute('content',
                'width=device-width, initial-scale=1.133, maximum-scale=1.133, user-scalable=0');
        } else if (window.innerWidth === 432) {
            document.querySelector("meta[name=viewport]").setAttribute('content',
                'width=device-width, initial-scale=1.152, maximum-scale=1.152, user-scalable=0');
        }
    }());
</script>


<script>
    if (MonthType == "long") {
        var monthname = Date.today().toString("MMMM");
    }

    if (MonthType == "short") {
        var monthname = Date.today().toString("MMM");
    }

    if (WeekdayType = "long") {
        var weekday = Date.today().toString("dddd");
    }

    if (WeekdayType = "short") {
        var weekday = Date.today().toString("ddd");
    }

    var daynum = Date.today().toString("dd");

    document.getElementById('day').innerHTML = daynum;
    document.getElementById('weekday').innerHTML = weekday + ", ";
    document.getElementById('month').innerHTML = monthname;
</script>

</html>
